<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");
        :root {
            --bg-1: #0f2027;
            --bg-2: #203a43;
            --bg-3: #2c5364;
            --accent-1: #00c6ff;
            --accent-2: #0072ff;
            --particle-1: rgba(0, 198, 255, 0.15);
            --particle-2: rgba(44, 83, 100, 0.2);
            --particle-3: rgba(32, 58, 67, 0.15);
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, sans-serif;
            background: linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
            transition: background 0.5s ease;
        }
        body::before {
            content: "";
            position: fixed;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 80%, var(--particle-1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, var(--particle-2) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, var(--particle-3) 0%, transparent 50%);
            animation: particleFloat 20s ease-in-out infinite;
            z-index: 0;
        }
        @keyframes particleFloat {
            0%, 100% { opacity: 1; transform: translateY(0px); }
            50% { opacity: 0.8; transform: translateY(-20px); }
        }
        .layout { display: flex; gap: 24px; padding: 30px; position: relative; z-index: 1; }
        .sidebar {
            width: 260px;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 20px;
            height: calc(100vh - 60px);
            position: sticky;
            top: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .sidebar h2 {
            margin: 0 0 30px 0;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 198, 255, 0.5);
            letter-spacing: -0.5px;
        }
        .sidebar nav {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            padding: 14px 16px;
            margin: 4px 0;
            border-radius: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }
        .sidebar nav a::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }
        .sidebar nav a:hover::before { left: 100%; }
        .sidebar nav a:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(0, 198, 255, 0.2);
        }
        .sidebar nav a.active {
            background: linear-gradient(135deg, rgba(0, 198, 255, 0.3), rgba(0, 114, 255, 0.15));
            border: 1px solid rgba(0, 198, 255, 0.4);
            box-shadow: 0 8px 25px rgba(0, 198, 255, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            font-weight: 700;
            color: #fff;
        }
        .content { flex: 1; max-width: 1400px; }
        .card {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(0, 198, 255, 0.3);
        }
        .header-section h2 {
            margin: 0 0 8px 0;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #00c6ff);
            -webkit-background-clip: text;
        }
        .btn-del {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px rgba(231, 76, 60, 0.3);
        }
        .btn-del:hover {
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.5);
            transform: translateY(-2px);
        }
        /* Responsive */
        @media(max-width: 1024px) {
            .layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                top: 0;
            }
            .header-section {
                flex-direction: column;
                align-items: flex-start;
            }
            .top-actions {
                width: 100%;
            }
        }
        @media(max-width: 768px) {
            .layout {
                padding: 20px;
            }
            .card {
                padding: 20px;
            }
            table {
                font-size: 13px;
            }
            table th, table td {
                padding: 12px 8px;
            }
            .edit-form {
                flex-direction: column;
                width: 100%;
            }
            .edit-form input,
            .edit-form select,
            .edit-form button {
                width: 100%;
            }
        }
    </style>
</head>

    <script>
    document.querySelectorAll('.btn-feriado').forEach(btn => {
        btn.addEventListener('click', function() {
            const dia = this.getAttribute('data-dia');
            fetch('/admin/toggle_feriado', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: dia})
            }).then(r => r.json()).then(d => { location.reload(); });
        });
    });
    document.querySelectorAll('.btn-abono').forEach(btn => {
        btn.addEventListener('click', function() {
            const dia = this.getAttribute('data-dia');
            const usuario_id = this.getAttribute('data-usuario');
            fetch('/admin/toggle_abono', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({data: dia, usuario_id: usuario_id})
            }).then(r => r.json()).then(d => { location.reload(); });
        });
    });
    </script>
