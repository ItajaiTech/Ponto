<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Inserir Batidas Manuais</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
        h1 { color: #0072ff; }
        form { display: flex; flex-direction: column; gap: 12px; }
        select, input[type="date"], input[type="time"] { padding: 8px; border-radius: 8px; border: 1px solid #ddd; }
        button { background: #0072ff; color: #fff; border: none; padding: 10px 18px; border-radius: 4px; cursor: pointer; font-size: 1.1em; }
        button:hover { background: #005bb5; }
        label { font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inserir Batidas Manuais</h1>
        <form method="POST" action="/admin/inserir_batidas">
            <label>Funcionário:</label>
            <select name="usuario_id">
                {% for f in funcionarios %}
                <option value="{{f.id}}">{{f.nome}}</option>
                {% endfor %}
            </select>
            <label>Data:</label>
            <input type="date" name="data_base" required>
            <label>Entrada 1:</label>
            <input type="time" name="entrada1" placeholder="Entrada 1">
            <label>Saída 1:</label>
            <input type="time" name="saida1" placeholder="Saída 1">
            <label>Entrada 2:</label>
            <input type="time" name="entrada2" placeholder="Entrada 2">
            <label>Saída 2:</label>
            <input type="time" name="saida2" placeholder="Saída 2">
            <button type="submit">Salvar Batidas</button>
        </form>
    </div>
</body>
</html>
