<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/themes.css">
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap");
        /* O restante dos estilos já está no themes.css */
    </style>
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <h2>⏱ PontoPro</h2>
            <nav>
                <a href="/admin">📊 Visão Geral</a>
                <a href="/dashboard">📈 Dashboard</a>
                <a href="/admin/empresa">🏢 Empresa</a>
                <a href="/admin/funcionarios">👥 Funcionários</a>
                <a href="/admin/gerar" class="active">⚙️ Gerar Batidas</a>
                <a href="/admin/inserir_batidas">📝 Inserir Batidas Manuais</a>
                <a href="/logout">🚪 Sair</a>
            </nav>
        </aside>
        <main class="content">
            <div class="card">
                <h2>⚙️ Gerar Batidas Aleatórias</h2>
                {% if mensagem %}
                <div style="background:#2ecc71;padding:15px;border-radius:10px;margin-bottom:20px;">
                    {{ mensagem }}
                </div>
                {% endif %}
                <form method="POST" style="max-width:400px;margin:auto;">
                    <input type="hidden" name="form_tipo" value="gerar_batidas">
                    <label for="usuario_id">Funcionário:</label>
                    <select name="usuario_id" id="usuario_id" required>
                        <option value="all">Todos Funcionários</option>
                        {% for f in funcionarios %}
                        <option value="{{f.id}}">{{f.nome}}</option>
                        {% endfor %}
                    </select>
                    <label for="mes">Mês:</label>
                    <select name="mes" id="mes" required>
                        {% for m in range(1,13) %}
                        <option value="{{m}}">{{'%02d' % m}}</option>
                        {% endfor %}
                    </select>
                    <label for="ano">Ano:</label>
                    <input type="number" name="ano" id="ano" min="2000" max="2100" value="{{ano or 2026}}" required>
                    <button type="submit" class="btn-primary" style="margin-top:18px;width:100%;font-size:1.1em;">Gerar Batidas Aleatórias</button>
                </form>
            </div>
        </main>
    </div>
    <script src="/static/theme.js"></script>
</body>
</html>
